 <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>List in HTML</title>
    </head>
    <body>
        <ul>
            <li>Bread</li>
            <li>Milk</li>
            <li>Eggs</li>
            <li>Butter</li>
            <li>Samosa</li>
            <li>Coldrink</li>
        </ul>
        <ol type="1">
            <li>Bread</li>
            <li>Milk</li>
            <li>Eggs</li>
            <li>Butter</li>
            <li>Samosa</li>
            <li>Coldrink</li>
        </ol>
        <ol type="A">
            <li>Bread</li>
            <li>Milk</li>
            <li>Eggs</li>
            <li>Butter</li>
            <li>Samosa</li>
            <li>Coldrink</li>
        </ol>
    </body>
</html>

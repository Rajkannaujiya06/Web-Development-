    <title>br,Bold,Italic & Underline Tag</title>

<body>
    <!-- This is a simple example of using br, bold, italic, and underline tags -->

    <p> <i><b>Na unhone kabhi apne liye kuch maanga,<br>
        Na apni <u>khwahishon</u> ka hisaab rakha.<br>
        Bas hamari khushi mein hi apni duniya dekhi,<br>
        Aur isi mein apna har khwaab rakha</b>.</i></p>
</body>
